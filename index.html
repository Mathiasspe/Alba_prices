<style>
:root{--bg:#0e1c0e;--bg2:#152415;--bg3:#1d301d;--card:#1a2e1a;--border:#2a3f2a;--accent:#d4e86a;--accent2:#b8d44a;--text:#f0f4e8;--muted:#7a9070;--danger:#e86a6a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
header{background:var(--bg);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;gap:1.5rem;height:56px;position:sticky;top:0;z-index:1000;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--text);display:flex;align-items:center;gap:.5rem;}
.logo-icon{width:28px;height:28px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--bg);}
.header-title{font-family:'Syne',sans-serif;font-size:.85rem;color:var(--muted);font-weight:400;border-left:1px solid var(--border);padding-left:1.5rem;margin-left:.5rem;}
.header-stats{margin-left:auto;display:flex;gap:1.5rem;font-size:.78rem;color:var(--muted);align-items:center;}
.header-stats span strong{color:var(--accent);font-weight:600;}
.week-badge{background:var(--bg3);border:1px solid var(--border);color:var(--accent);font-size:.72rem;padding:.2rem .7rem;border-radius:20px;white-space:nowrap;}
.scrape-date{font-size:.7rem;color:var(--muted);opacity:.7;}
.layout{display:grid;grid-template-columns:420px 1fr;height:calc(100vh - 56px);}
.panel{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel-header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:.8rem;}
.panel-title{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:space-between;}
.count-badge{background:var(--bg3);border:1px solid var(--border);color:var(--accent);font-size:.75rem;font-weight:500;padding:.2rem .6rem;border-radius:20px;}
.search-wrap{position:relative;}
.search-wrap svg{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:var(--muted);}

.filters{display:flex;gap:.5rem;flex-wrap:wrap;}
.filter-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.75rem;padding:.3rem .7rem;border-radius:20px;cursor:pointer;transition:all .15s;}
.filter-btn:hover,.filter-btn.active{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:600;}
.sort-row{display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--muted);}
select{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.75rem;padding:.3rem .6rem;border-radius:6px;outline:none;cursor:pointer;}
.venue-list{overflow-y:auto;flex:1;padding:.5rem;}
.venue-list::-webkit-scrollbar{width:4px;}
.venue-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.venue-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.9rem 1rem;margin-bottom:.4rem;cursor:pointer;transition:all .15s;display:grid;grid-template-columns:1fr auto;gap:.3rem;align-items:start;}
.venue-card:hover{border-color:var(--accent);background:var(--bg3);transform:translateX(2px);}
.venue-card.selected{border-color:var(--accent);background:#1e3a1e;box-shadow:0 0 0 1px var(--accent) inset;}
.venue-card.in-selection{border-color:var(--accent2);background:#1c351c;}
.venue-name{font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;color:var(--text);line-height:1.3;}
.venue-location{font-size:.73rem;color:var(--muted);margin-top:.2rem;}
.price-tag{text-align:right;}
.price-min{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:800;color:var(--accent);}
.price-max{font-size:.7rem;color:var(--muted);margin-top:.1rem;}
.price-same{font-size:.7rem;color:#5a7a5a;}
.no-price{font-size:.72rem;color:var(--muted);font-style:italic;}
.map-container{position:relative;display:flex;flex-direction:column;}
#map{flex:1;background:var(--bg);}
.map-controls{position:absolute;top:1rem;right:1rem;z-index:500;display:flex;flex-direction:column;gap:.5rem;}
.map-btn{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.78rem;padding:.5rem .9rem;border-radius:8px;cursor:pointer;transition:all .15s;white-space:nowrap;}

.map-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600;}
.selection-panel{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,var(--bg) 80%,transparent);padding:1.5rem;z-index:500;display:none;}
.selection-panel.visible{display:block;}
.selection-inner{background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.selection-count{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--accent);}
.selection-stats{display:flex;gap:1.5rem;font-size:.8rem;color:var(--muted);}
.selection-stats span strong{color:var(--text);font-weight:600;}
.clear-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:.4rem .8rem;border-radius:6px;cursor:pointer;font-size:.75rem;transition:all .15s;}
.clear-btn:hover{border-color:var(--danger);color:var(--danger);}
.draw-hint{position:absolute;top:1rem;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--accent);border-radius:20px;padding:.4rem 1rem;font-size:.78rem;color:var(--accent);z-index:500;pointer-events:none;opacity:0;transition:opacity .3s;}
.draw-hint.visible{opacity:1;}
.leaflet-container{background:#1a2a1a !important;}
.leaflet-tile-pane{filter:brightness(.7) saturate(.6) hue-rotate(80deg);}
.custom-marker{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:.58rem;font-weight:800;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.5);border:2px solid;}
.custom-marker:hover{transform:scale(1.25);z-index:1000 !important;}
.leaflet-popup-content-wrapper{background:var(--card) !important;border:1px solid var(--accent) !important;border-radius:10px !important;box-shadow:0 8px 32px rgba(0,0,0,.6) !important;color:var(--text) !important;}
.leaflet-popup-tip{background:var(--card) !important;}
.leaflet-popup-close-button{color:var(--muted) !important;}
.popup-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;color:var(--text);margin-bottom:.3rem;}
.popup-addr{font-size:.75rem;color:var(--muted);margin-bottom:.4rem;}

.popup-price{display:flex;align-items:baseline;gap:.4rem;}

.popup-price-range{font-size:.78rem;color:var(--muted);}
</style>

<script>
const RAW_VENUES=JSON.parse(document.getElementById('venue-data').textContent);
function getWN(d){const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));dt.setUTCDate(dt.getUTCDate()+4-(dt.getUTCDay()||7));const y=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil((((dt-y)/86400000)+1)/7);}
function fmtWeek(){const t=new Date();const wk=getWN(t);const jd=t.getDay();const off=jd===0?-6:1-jd;const m=new Date(t);m.setDate(t.getDate()+off);const s=new Date(m);s.setDate(m.getDate()+6);const f=d=>d.toLocaleDateString('no-NO',{day:'numeric',month:'short'});return 'Uke '+wk+' · '+f(m)+'–'+f(s);}
function wkMinMax(p){if(!p)return{min:null,max:null};let pr=[];for(const k of['1','2','3','4','5','6','7']){if(p[k])pr=pr.concat(Object.values(p[k]).filter(x=>typeof x==='number'));}if(!pr.length)return{min:null,max:null};return{min:Math.min(...pr),max:Math.max(...pr)};}
const VENUES=RAW_VENUES.map(v=>{const{min,max}=wkMinMax(v.pricesByDay);return{...v,minPrice:min,maxPrice:max};});
let markers={},map,filtered=[],selV=null,selArea=new Set(),drawMode=false,dragStart=null,selLayer=null;
function pColor(p){if(!p)return{b:'#3a5a3a',bg:'#1a2e1a',t:'#5a7a5a'};if(p<200)return{b:'#6ae8a0',bg:'#1a3a2a',t:'#6ae8a0'};if(p<300)return{b:'#d4e86a',bg:'#2a3a1a',t:'#d4e86a'};if(p<400)return{b:'#e8c46a',bg:'#3a2e1a',t:'#e8c46a'};return{b:'#e86a6a',bg:'#3a1a1a',t:'#e86a6a'};}
function mkPopup(v){const a=[v.address,v.postcode,v.postname].filter(Boolean).join(', ');return '<div class="popup-name">'+v.name+'</div><div class="popup-addr">'+(a||'\u2013')+'</div><div class="popup-week">\uD83D\uDCC5 '+fmtWeek()+'</div><div class="popup-price"><span class="popup-price-min">'+(v.minPrice??'\u2013')+' NOK</span>'+(v.maxPrice&&v.maxPrice!==v.minPrice?' <span class="popup-price-range">\u2013 '+v.maxPrice+' NOK</span>':v.minPrice?' <span class="popup-price-range">\u00B7 fast pris</span>':'')+'</div>';}
function initMap(){map=L.map('map',{zoomControl:true}).setView([62.5,10.5],5);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'\u00A9 OpenStreetMap'}).addTo(map);setupDraw();}
function addMarkers(){VENUES.forEach(v=>{if(!v.lat||!v.lng)return;const c=pColor(v.minPrice);const icon=L.divIcon({className:'',html:'<div class="custom-marker" style="background:'+c.bg+';border-color:'+c.b+';color:'+c.t+'">'+(v.minPrice??'?')+'</div>',iconSize:[36,36],iconAnchor:[18,18]});const m=L.marker([v.lat,v.lng],{icon}).addTo(map);m.bindPopup(mkPopup(v));m.on('click',()=>selVenue(v.id));markers[v.id]=m;});}
function buildFilters(){const rs=['all',...new Set(VENUES.map(v=>v.region).filter(Boolean).sort())];const el=document.getElementById('region-filters');el.innerHTML='';rs.forEach(r=>{const b=document.createElement('button');b.className='filter-btn'+(r==='all'?' active':'');b.dataset.region=r;b.textContent=r==='all'?'Alle':r;b.addEventListener('click',()=>{document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');applyF();});el.appendChild(b);});}
function updStats(){const wp=VENUES.filter(v=>v.minPrice);document.getElementById('stat-total').textContent=VENUES.length;document.getElementById('week-badge').textContent=fmtWeek();if(wp.length){const ms=wp.map(v=>v.minPrice);document.getElementById('stat-avg-min').textContent=Math.round(ms.reduce((a,b)=>a+b,0)/ms.length);document.getElementById('stat-range').textContent=Math.min(...ms)+'\u2013'+Math.max(...ms);}}
function renderList(){const list=document.getElementById('venue-list');document.getElementById('list-count').textContent=filtered.length;if(!filtered.length){list.innerHTML='<div style="padding:2rem;text-align:center;color:var(--muted);font-size:.85rem;">Ingen steder funnet</div>';return;}list.innerHTML=filtered.map(v=>{const a=[v.postname,v.region].filter(Boolean).join(', ');const ph=v.minPrice?'<div class="price-min">'+v.minPrice+' NOK</div>'+(v.maxPrice&&v.maxPrice!==v.minPrice?'<div class="price-max">maks '+v.maxPrice+' NOK</div>':'<div class="price-same">fast pris</div>'):'<div class="no-price">Ingen pris</div>';return '<div class="venue-card'+(v.id===selV?' selected':'')+(selArea.has(v.id)?' in-selection':'')+'" onclick="selVenue(\''+ v.id +'\')" data-id="'+v.id+'"><div><div class="venue-name">'+v.name+'</div><div class="venue-location">'+(a||'\u2013')+'</div></div><div class="price-tag">'+ph+'</div></div>';}).join('');}
function applyF(){const q=document.getElementById('search').value.toLowerCase();const r=document.querySelector('.filter-btn.active')?.dataset.region||'all';const s=document.getElementById('sort').value;filtered=VENUES.filter(v=>(!q||v.name.toLowerCase().includes(q)||v.address.toLowerCase().includes(q)||v.region.toLowerCase().includes(q))&&(r==='all'||v.region===r));filtered.sort((a,b)=>{if(s==='name')return a.name.localeCompare(b.name,'no');if(s==='min-asc')return(a.minPrice||9999)-(b.minPrice||9999);if(s==='min-desc')return(b.minPrice||0)-(a.minPrice||0);if(s==='region')return(a.region||'').localeCompare(b.region||'','no');return 0;});renderList();}
document.getElementById('search').addEventListener('input',applyF);
document.getElementById('sort').addEventListener('change',applyF);
function selVenue(id){selV=id;renderList();const v=VENUES.find(x=>x.id===id);if(v?.lat&&v?.lng){map.setView([v.lat,v.lng],13,{animate:true});markers[id]?.openPopup();}document.querySelector('[data-id="'+id+'"]')?.scrollIntoView({behavior:'smooth',block:'nearest'});}
function setupDraw(){document.getElementById('btn-select-area').addEventListener('click',()=>{drawMode=!drawMode;const b=document.getElementById('btn-select-area');const h=document.getElementById('draw-hint');if(drawMode){b.classList.add('active');b.textContent='\u2B1A Velger...';h.classList.add('visible');map.getContainer().style.cursor='crosshair';map.dragging.disable();}else exitDraw();});map.on('mousedown',e=>{if(drawMode)dragStart=e.latlng;});map.on('mousemove',e=>{if(!drawMode||!dragStart)return;if(selLayer)map.removeLayer(selLayer);selLayer=L.rectangle(L.latLngBounds(dragStart,e.latlng),{color:'#d4e86a',weight:2,opacity:.9,fillColor:'#d4e86a',fillOpacity:.1,dashArray:'5,5'}).addTo(map);});map.on('mouseup',e=>{if(!drawMode||!dragStart)return;const bounds=L.latLngBounds(dragStart,e.latlng);dragStart=null;exitDraw();const inB=VENUES.filter(v=>v.lat&&v.lng&&bounds.contains([v.lat,v.lng]));selArea=new Set(inB.map(v=>v.id));updSel(inB);renderList();document.getElementById('btn-clear-selection').style.display=inB.length?'block':'none';});document.getElementById('btn-clear-selection').addEventListener('click',clrSel);document.getElementById('clear-sel-btn').addEventListener('click',clrSel);}
function exitDraw(){drawMode=false;document.getElementById('btn-select-area').classList.remove('active');document.getElementById('btn-select-area').textContent='\u2B1A Velg omr\u00E5de';document.getElementById('draw-hint').classList.remove('visible');map.getContainer().style.cursor='';map.dragging.enable();}
function updSel(vs){const p=document.getElementById('selection-panel');if(!vs.length){p.classList.remove('visible');return;}p.classList.add('visible');document.getElementById('sel-count').textContent=vs.length;const wp=vs.filter(v=>v.minPrice);if(wp.length){document.getElementById('sel-min').textContent=Math.min(...wp.map(v=>v.minPrice));document.getElementById('sel-max').textContent=Math.max(...wp.map(v=>v.maxPrice||v.minPrice));document.getElementById('sel-avg').textContent=Math.round(wp.reduce((s,v)=>s+v.minPrice,0)/wp.length);}}
function clrSel(){selArea=new Set();if(selLayer){map.removeLayer(selLayer);selLayer=null;}document.getElementById('selection-panel').classList.remove('visible');document.getElementById('btn-clear-selection').style.display='none';renderList();}
initMap();filtered=[...VENUES];addMarkers();buildFilters();applyF();updStats();
</script>
</body>
</html>
